services:
  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${DB_USER:-earthsync}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-earthsync}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-earthsync} -d ${DB_NAME:-earthsync}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3000"
    environment:
      EARTHSYNC_PORT: 3000
      EARTHSYNC_JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32chars!}
      EARTHSYNC_API_INGEST_KEY: ${API_INGEST_KEY:-changeme-in-production}
      EARTHSYNC_REDIS_HOST: redis
      EARTHSYNC_REDIS_PORT: 6379
      EARTHSYNC_REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      EARTHSYNC_DB_HOST: timescaledb
      EARTHSYNC_DB_PORT: 5432
      EARTHSYNC_DB_USER: ${DB_USER:-earthsync}
      EARTHSYNC_DB_PASSWORD: ${DB_PASSWORD:-password}
      EARTHSYNC_DB_NAME: ${DB_NAME:-earthsync}
      EARTHSYNC_CORS_ORIGINS: '["http://localhost:${CLIENT_PORT:-3080}"]'
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_PORT:-3080}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

volumes:
  redisdata:
  pgdata:

networks:
  default:
    name: earthsync-network
    driver: bridge
