version: '3.8'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: earthsync_user
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: earthsync_db
    volumes:
      - earthsync_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    command: redis-server --requirepass your_secure_redis_password
    volumes:
      - earthsync_redis_data:/data
    ports:
      - "6379:6379"
  server:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
volumes:
  earthsync_data:
  earthsync_redis_data: