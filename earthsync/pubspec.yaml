name: earthsync
description: A Flutter app for brainwave entrainment with Earth's rhythm
version: 1.0.0
environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.17.0
  fl_chart: ^0.63.0
  flutter_cube: ^0.1.1
  web_socket_channel: ^2.4.0
  provider: ^6.0.5
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.2.0
  firebase_messaging: ^14.6.9
  firebase_core: ^2.15.0
  share_plus: ^7.1.0
  sqflite: ^2.3.0
  just_audio: ^0.9.35
  just_audio_background: ^0.0.1-beta.10
  sentry_flutter: ^7.9.0
  firebase_performance: ^0.9.2
  firebase_crashlytics: ^3.3.4
  flutter_blue: ^0.8.0
  encrypt: ^5.0.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter:
  assets:
    - assets/earth.obj
    - assets/earth.png
    - assets/splash_earth.png
    - assets/meditation_5min.mp3
    - assets/rain.mp3
    - assets/forest.mp3
    - lib/l10n/app_en.arb
    - lib/l10n/app_es.arb
  plugins:
    - path: .

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"