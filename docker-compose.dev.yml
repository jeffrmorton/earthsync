      EARTHSYNC_SIMULATOR_LONGITUDE: "17.27"
      EARTHSYNC_SIMULATOR_INTERVAL_MS: "10000"
      EARTHSYNC_SIMULATOR_SEGMENT_DURATION_S: "10"
      EARTHSYNC_SIMULATOR_REDIS_HOST: redis
      EARTHSYNC_SIMULATOR_REDIS_PORT: "6379"
      EARTHSYNC_SIMULATOR_REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
    depends_on:
      redis:
